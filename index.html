<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINANCEME - Control Financiero Inteligente</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.39.3/dist/umd/supabase.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary: #0f172a;
            --accent: #10b981;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #1e293b;
            /* Aplicamos tu preferencia de MAYÚSCULAS a nivel global para datos */
            text-transform: uppercase;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.07);
        }
    </style>
</head>
<body>

    <div id="app" class="min-h-screen">
        <nav class="glass-card sticky top-0 z-50 px-6 py-4 mb-8">
            <div class="max-w-7xl mx-auto flex justify-between items-center">
                <h1 class="text-2xl font-bold tracking-tighter text-slate-900">FINANCEME</h1>
                <div id="user-profile" class="flex items-center gap-4">
                    <span id="current-date" class="text-sm font-medium text-slate-500"></span>
                    <div class="h-8 w-8 rounded-full bg-slate-200 flex items-center justify-center">
                        <i data-lucide="user" class="w-5 h-5 text-slate-600"></i>
                    </div>
                </div>
            </div>
        </nav>

        <main class="max-w-7xl mx-auto px-6 pb-12">
            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6 mb-8">
                <div class="glass-card p-6 rounded-2xl bg-slate-900 text-white lg:col-span-2">
                    <p class="text-slate-400 text-sm mb-1">Balance Total</p>
                    <h2 class="text-4xl font-bold mb-6" id="total-balance">$0.00</h2>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="bg-white/10 p-4 rounded-xl">
                            <p class="text-xs text-slate-400">Ingresos</p>
                            <p class="text-xl font-semibold text-emerald-400" id="total-income">+$0.00</p>
                        </div>
                        <div class="bg-white/10 p-4 rounded-xl">
                            <p class="text-xs text-slate-400">Gastos</p>
                            <p class="text-xl font-semibold text-rose-400" id="total-expenses">-$0.00</p>
                        </div>
                    </div>
                </div>

                <div class="glass-card p-6 rounded-2xl flex flex-col justify-between">
                    <h3 class="font-bold mb-4">Acceso Rápido</h3>
                    <div class="space-y-3">
                        <button onclick="openModal('expense')" class="w-full bg-slate-900 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2">
                            <i data-lucide="minus-circle" class="w-5 h-5"></i> Registrar Gasto
                        </button>
                        <button onclick="openModal('income')" class="w-full bg-emerald-500 text-white py-3 rounded-xl font-bold flex items-center justify-center gap-2">
                            <i data-lucide="plus-circle" class="w-5 h-5"></i> Registrar Ingreso
                        </button>
                    </div>
                </div>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                <div class="glass-card p-6 rounded-2xl">
                    <canvas id="mainChart"></canvas>
                </div>
                <div class="glass-card p-6 rounded-2xl">
                    <canvas id="categoryChart"></canvas>
                </div>
            </div>
        </main>
    </div>

    <script>
        // CONFIGURACIÓN DE SUPABASE
        const supabaseUrl = 'https://scywjavegmdgnqvcweqo.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...'; // Tu clave completa

        // Inicialización forzada usando el objeto global window
        const _supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

        window.onload = () => {
            // 1. Inicializar Iconos
            lucide.createIcons();
            
            // 2. Fecha Actual
            const dateEl = document.getElementById('current-date');
            if(dateEl) {
                dateEl.innerText = new Intl.DateTimeFormat('es-MX', { dateStyle: 'full' }).format(new Date());
            }

            // 3. Verificar Sesión
            const savedUser = localStorage.getItem('financeme_user');
            console.log("App cargada correctamente");
            
            // Cargar datos iniciales
            loadDashboardData();
        };

        async function loadDashboardData() {
            // Aquí irá tu lógica para traer datos de la base de datos
            // Por ahora mantenemos los valores en 0 hasta que el usuario inicie sesión
            console.log("Cargando datos desde Supabase...");
        }

        function openModal(type) {
            alert("FUNCIÓN PARA REGISTRAR " + type.toUpperCase());
        }
    </script>
</body>
</html>
