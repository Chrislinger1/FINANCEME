<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINANCEME - Control Financiero Inteligente</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --primary: #0f172a;
            --accent: #10b981;
            --bg: #f8fafc;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: #1e293b;
            /* Aplicamos tu preferencia de MAYÚSCULAS en los textos de datos */
            text-transform: uppercase;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
        }

        .sidebar-item.active {
            background-color: #f1f5f9;
            border-right: 4px solid var(--accent);
            color: var(--primary);
        }

        .btn-primary {
            background-color: var(--primary);
            transition: all 0.2s;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        input, select {
            border: 1px solid #e2e2e2;
            padding: 0.6rem;
            border-radius: 0.5rem;
            outline: none;
            transition: border 0.2s;
            text-transform: uppercase;
        }

        input:focus { border-color: var(--accent); }
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="min-h-screen">

    <div id="login-screen" class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900 bg-opacity-90 transition-opacity">
        <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md mx-4">
            <div class="text-center mb-8">
                <h1 class="text-3xl font-bold text-slate-800">FINANCEME</h1>
                <p class="text-slate-500 lowercase">Tu futuro financiero empieza hoy</p>
            </div>
            <form id="login-form" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">Email</label>
                    <input type="email" id="login-email" class="w-full" placeholder="tu@email.com" required>
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Contraseña</label>
                    <input type="password" id="login-pass" class="w-full" required>
                </div>
                <button type="submit" class="w-full btn-primary text-white py-3 rounded-lg font-semibold">Entrar</button>
            </form>
            <button id="google-login" class="mt-6 w-full flex items-center justify-center gap-2 border border-slate-200 py-3 rounded-lg hover:bg-slate-50">
                <img src="https://www.google.com/favicon.ico" class="w-4 h-4"> Google Account
            </button>
        </div>
    </div>

    <div id="app-content" class="hidden flex flex-col md:flex-row min-h-screen">
        <nav class="w-full md:w-64 bg-white border-r border-slate-200 p-4 flex flex-col">
            <div class="flex items-center gap-2 px-2 mb-10">
                <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center text-white font-bold">F</div>
                <span class="text-xl font-bold">FINANCEME</span>
            </div>
            <div class="space-y-1 flex-1">
                <button onclick="showSection('dashboard')" class="sidebar-item active w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-50 transition-all">
                    <i data-lucide="layout-dashboard"></i> Dashboard
                </button>
                <button onclick="showSection('transactions')" class="sidebar-item w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-50 transition-all">
                    <i data-lucide="arrow-up-down"></i> Movimientos
                </button>
                <button onclick="showSection('debts')" class="sidebar-item w-full flex items-center gap-3 p-3 rounded-xl hover:bg-slate-50 transition-all">
                    <i data-lucide="landmark"></i> Deudas y Plan
                </button>
            </div>
            <div class="pt-10 border-t border-slate-100 mt-auto">
                <button onclick="logout()" class="w-full flex items-center gap-3 p-3 rounded-xl text-red-500 hover:bg-red-50 transition-all">
                    <i data-lucide="log-out"></i> Cerrar Sesión
                </button>
            </div>
        </nav>

        <main class="flex-1 p-6 md:p-10 overflow-y-auto">
            <header class="flex justify-between items-center mb-8">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800">HOLA, <span id="user-name">USUARIO</span></h2>
                    <p class="text-slate-500 text-sm" id="current-date"></p>
                </div>
                <button onclick="openModal('add-transaction')" class="btn-primary text-white px-5 py-2.5 rounded-full flex items-center gap-2 shadow-lg">
                    <i data-lucide="plus" class="w-4 h-4"></i> NUEVO
                </button>
            </header>

            <section id="dashboard-section" class="space-y-6">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div class="glass-card p-6 rounded-2xl">
                        <p class="text-slate-500 text-sm font-medium mb-1">BALANCE TOTAL</p>
                        <h3 class="text-3xl font-bold" id="total-balance">$0.00</h3>
                    </div>
                    <div class="glass-card p-6 rounded-2xl bg-emerald-500 text-white">
                        <p class="opacity-80 text-sm font-medium mb-1">INGRESOS MES</p>
                        <h3 class="text-3xl font-bold" id="monthly-income">$0.00</h3>
                    </div>
                    <div class="glass-card p-6 rounded-2xl border-l-4 border-l-red-500">
                        <p class="text-slate-500 text-sm font-medium mb-1">GASTOS MES</p>
                        <h3 class="text-3xl font-bold" id="monthly-expense">$0.00</h3>
                    </div>
                </div>
                <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
                    <div class="glass-card p-6 rounded-2xl"><canvas id="mainChart"></canvas></div>
                    <div class="glass-card p-6 rounded-2xl"><canvas id="categoryChart"></canvas></div>
                </div>
            </section>
        </main>
    </div>

    <script>
        // CONFIGURACIÓN REAL DE SUPABASE
        const supabaseUrl = 'https://scywjavegmdgnqvcweqo.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNjeXdqYXZlZ21kZ25xdmN3ZXFvIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0Mzk4NDcsImV4cCI6MjA5NDAxNTg0N30.pIbcLDuq2o8cewRxg-pPPkbvAF4D3Gj9I5Sde3GEJes';
        
        // Inicializamos el cliente
        const _supabase = supabase.createClient(supabaseUrl, supabaseKey);

        let currentUser = null;

        window.onload = () => {
            lucide.createIcons();
            document.getElementById('current-date').innerText = new Intl.DateTimeFormat('es-MX', { dateStyle: 'full' }).format(new Date());
            
            // Verificar si hay sesión activa
            const savedUser = localStorage.getItem('financeme_user');
            if (savedUser) { loginSuccess(JSON.parse(savedUser)); }
            
            initCharts();
        };

        async function loginSuccess(user) {
            currentUser = user;
            localStorage.setItem('financeme_user', JSON.stringify(user));
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');
            document.getElementById('user-name').innerText = user.name.toUpperCase();
        }

        document.getElementById('login-form').onsubmit = async (e) => {
            e.preventDefault();
            const email = document.getElementById('login-email').value;
            const password = document.getElementById('login-pass').value;

            // Intentar Login Real en Supabase
            const { data, error } = await _supabase.auth.signInWithPassword({
                email: email,
                password: password,
            });

            if (error) {
                alert("Error: " + error.message);
            } else {
                loginSuccess({ email: data.user.email, name: data.user.email.split('@')[0] });
            }
        };

        function logout() {
            _supabase.auth.signOut();
            localStorage.removeItem('financeme_user');
            location.reload();
        }

        function initCharts() {
            const ctxMain = document.getElementById('mainChart').getContext('2d');
            new Chart(ctxMain, {
                type: 'line',
                data: {
                    labels: ['ENE', 'FEB', 'MAR', 'ABR', 'MAY', 'JUN'],
                    datasets: [{ label: 'FLUJO', data: [12, 19, 3, 5, 2, 3], borderColor: '#10b981', tension: 0.4 }]
                }
            });
        }
        
        // Función para cambiar de sección
        function showSection(section) {
            document.getElementById('dashboard-section').classList.toggle('hidden', section !== 'dashboard');
            document.querySelectorAll('.sidebar-item').forEach(btn => btn.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }
    </script>
</body>
</html>
