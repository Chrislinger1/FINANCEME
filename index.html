<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FINANCEME - DASHBOARD</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <style>
        body { 
            background-color: #f8fafc; 
            text-transform: uppercase; /* Tu preferencia de MAYÚSCULAS */
            font-family: sans-serif;
        }
        .glass-card { background: white; border-radius: 1rem; border: 1px solid #e2e8f0; padding: 1.5rem; }
    </style>
</head>
<body>

    <div id="app" class="p-6 max-w-4xl mx-auto">
        <nav class="flex justify-between items-center mb-8">
            <h1 class="text-3xl font-bold text-slate-900">FINANCEME</h1>
            <div id="status-dot" class="h-3 w-3 rounded-full bg-red-500" title="Desconectado"></div>
        </nav>

        <div class="grid gap-6">
            <div class="glass-card bg-slate-900 text-white">
                <p class="text-slate-400 text-sm">BALANCE TOTAL</p>
                <h2 id="total-balance" class="text-4xl font-bold">$0.00</h2>
            </div>

            <div class="flex gap-4">
                <button onclick="testAction('GASTO')" class="flex-1 bg-rose-500 text-white p-4 rounded-xl font-bold"> - GASTO</button>
                <button onclick="testAction('INGRESO')" class="flex-1 bg-emerald-500 text-white p-4 rounded-xl font-bold"> + INGRESO</button>
            </div>
            
            <div id="debug-console" class="text-xs font-mono bg-black text-green-400 p-4 rounded mt-10 overflow-auto max-h-40">
                INICIALIZANDO SISTEMA...
            </div>
        </div>
    </div>

    <script>
        // CONFIGURACIÓN
        const SB_URL = 'https://scywjavegmdgnqvcweqo.supabase.co';
        const SB_KEY = 'tu_anon_key_aqui'; // Asegúrate de pegar tu clave completa aquí

        function log(msg) {
            const consoleEl = document.getElementById('debug-console');
            consoleEl.innerHTML += `<br>> ${msg}`;
            console.log(msg);
        }

        window.onload = async () => {
            log("VENTANA CARGADA");
            lucide.createIcons();

            try {
                // Inicialización ultra-segura
                if (typeof window.supabase === 'undefined') {
                    throw new Error("LIBRERIA SUPABASE NO CARGADA");
                }

                const _supabase = window.supabase.createClient(SB_URL, SB_KEY);
                log("CONECTADO A SUPABASE");
                document.getElementById('status-dot').classList.replace('bg-red-500', 'bg-green-500');

                // Intento simple de lectura
                const { data, error } = await _supabase.from('transactions').select('*').limit(1);
                if (error) log("ERROR RLS: " + error.message);
                else log("CONEXIÓN EXITOSA: DATOS RECIBIDOS");

            } catch (e) {
                log("FALLO CRÍTICO: " + e.message);
            }
        };

        function testAction(tipo) {
            alert("REGISTRANDO: " + tipo);
            log("CLIC EN " + tipo);
        }
    </script>
</body>
</html>
